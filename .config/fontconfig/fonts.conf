<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- default Latin fonts -->
  <alias>
    <family>serif</family>
    <prefer><family>Source Serif 4</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Source Sans 3</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>Source Sans 3</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Source Code Pro</family></prefer>
  </alias>

  <!-- bump up font sizes -->
  <match target="font">
    <edit name="dpi" mode="assign">
      <double>96</double>
    </edit>
  </match>

  <!-- default Japanese fonts -->
  <!-- serif -->
  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="append">
      <string>Source Han Serif</string>
    </edit>
  </match>
  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="append">
      <string>Source Han Sans</string>
    </edit>
  </match>
</fontconfig>
